name: Release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: tar czf sree-${{ matrix.target }}.tar.gz -C target/release sree
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path target/release/sree.exe -DestinationPath sree-${{ matrix.target }}.zip
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            sree-*.tar.gz
            sree-*.zip
