# Performance Configuration
# Optimized for speed and token efficiency

[llm]
aws_region = "us-east-1"
model = "anthropic.claude-haiku-3-20250307-v1:0"  # Fastest model
max_tokens = 4096  # Lower token limit for faster responses
temperature = 0.5  # More focused responses

[ui]
theme = "dark"
show_token_count = true  # Monitor token usage
show_elapsed_time = true  # Monitor performance
auto_scroll = true
word_wrap = true
code_theme = "base16-ocean.dark"

[tools]
bash_timeout = 15  # Shorter timeout
max_file_size = 524288  # 512KB - smaller files only
max_output_lines = 200  # Less output to process

[keybindings]
send = "Enter"
newline = "Shift+Enter"
cancel = "Ctrl+C"
clear = "Ctrl+L"
