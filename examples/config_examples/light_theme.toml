# Light Theme Configuration
# Optimized for light terminal backgrounds

[llm]
aws_region = "us-east-1"
model = "anthropic.claude-sonnet-4-20250514-v1:0"
max_tokens = 8192
temperature = 0.7

[ui]
theme = "light"  # Light theme for light terminals
show_token_count = true
show_elapsed_time = true
auto_scroll = true
word_wrap = true
code_theme = "base16-ocean.light"  # Light syntax theme

[tools]
bash_timeout = 30
max_file_size = 1048576
max_output_lines = 500

[keybindings]
send = "Enter"
newline = "Shift+Enter"
cancel = "Ctrl+C"
clear = "Ctrl+L"
